  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Kaadu — Typography &amp; Spacing Docs v2<\u002Ftitle>\n\n<style>\n@font-face { font-family:'Fagies'; src:url(\"b9b01e97-ad58-437f-ac82-0e87bd2037d8\") format('truetype'); font-weight:400; font-display:swap; }\n@font-face { font-family:'Banter Grotesk'; src:url(\"541e3dc2-19d9-4c7c-b65e-8cfac00afdd5\") format('woff2'); font-weight:400; font-display:swap; }\n@font-face { font-family:'Banter Grotesk'; src:url(\"541e3dc2-19d9-4c7c-b65e-8cfac00afdd5\") format('woff2'); font-weight:700; font-display:swap; }\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n:root {\n  --red:    #AE0000; --violet: #542A76; --pink:  #FFC5FF;\n  --cream:  #FFFFF5; --lime:   #ACFF64; --black: #000;\n  --orange: #FF781E; --yellow: #EDF731; --sky:   #B7D9FF;\n  --grey:   #8C8C8C; --lgrey:  #E6E6E6;\n  --fdisp:  'Fagies', Helvetica, Arial, sans-serif;\n  --fui:    'Banter Grotesk', Helvetica, Arial, sans-serif;\n}\nhtml { scroll-behavior: smooth; }\nbody { background: #f2f2ec; font-family: var(--fui); color: #000; }\n\n/* ── NAV ── */\n.doc-nav {\n  position: sticky; top: 0; z-index: 50;\n  background: #000; border-bottom: 3px solid var(--red);\n  padding: 0 32px; display: flex; align-items: center; height: 52px;\n  gap: 0; overflow-x: auto; white-space: nowrap;\n}\n.doc-nav .brand { font-family: var(--fdisp); font-size: 20px; text-transform: uppercase; color: var(--red); padding-right: 28px; border-right: 1px solid #333; margin-right: 20px; flex-shrink:0; }\n.doc-nav a { font-family: var(--fui); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,245,0.55); text-decoration: none; margin-right: 20px; flex-shrink:0; transition: color 0.12s; }\n.doc-nav a:hover { color: var(--cream); }\n\n/* ── PAGE ── */\n.page { max-width: 980px; margin: 0 auto; padding: 48px 32px 96px; }\n\n/* ── SECTION HEADER ── */\n.sec { margin-top: 72px; }\n.sec-title { font-family: var(--fdisp); font-size: 52px; text-transform: uppercase; color: var(--red); line-height: 1; }\n.sec-sub { font-family: var(--fui); font-size: 14px; color: var(--grey); margin-top: 6px; margin-bottom: 28px; padding-bottom: 14px; border-bottom: 2px solid #000; line-height: 1.5; }\n\n/* ── SPECIMEN CARD ── */\n.card { border: 2px solid #000; margin-bottom: 14px; }\n.card-head { background: #000; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }\n.card-name  { font-family: var(--fui); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--cream); }\n.card-spec  { font-family: 'Courier New', monospace; font-size: 11px; color: var(--lime); }\n.card-body  { padding: 24px; }\n.card-code  {\n  border-top: 1px solid #ddd; background: #181818;\n  padding: 14px 18px; font-family: 'Courier New', monospace;\n  font-size: 12px; line-height: 1.8; color: #ccc;\n  overflow-x: auto; white-space: pre;\n}\n/* syntax colouring */\n.k { color: #F8BC45; } /* key */\n.v { color: #ACFF64; } /* value */\n.s { color: #FFC5FF; } /* string */\n.c { color: #555;    } /* comment */\n\n/* ── TABLE ── */\n.tbl { width: 100%; border-collapse: collapse; margin-bottom: 28px; font-size: 13px; }\n.tbl th { background: #000; color: var(--cream); font-family: var(--fui); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; padding: 9px 12px; text-align: left; border: 2px solid #000; }\n.tbl td { padding: 9px 12px; border: 1px solid #d8d8d0; background: var(--cream); vertical-align: top; line-height: 1.5; }\n.tbl tr:nth-child(even) td { background: #f5f5ec; }\n.mono { font-family: 'Courier New', monospace; font-size: 12px; color: var(--violet); }\n.val  { font-family: 'Courier New', monospace; font-size: 12px; color: var(--red); font-weight: 700; }\n\n/* ── SPACE VIZ ── */\n.sp-row { display: flex; align-items: center; gap: 14px; margin-bottom: 9px; }\n.sp-bar  { background: var(--red); height: 22px; flex-shrink: 0; }\n.sp-tok  { font-family: 'Courier New', monospace; font-size: 12px; color: var(--violet); font-weight: 700; }\n.sp-px   { font-family: 'Courier New', monospace; font-size: 12px; color: var(--grey); margin-left: 6px; }\n.sp-note { font-family: var(--fui); font-size: 12px; color: #666; margin-left: 6px; }\n\n/* ── RADIUS VIZ ── */\n.rad-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 24px; }\n.rad-box  { background: var(--cream); border: 2px solid #000; width: 80px; height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }\n.rad-n  { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; color: var(--red); }\n.rad-t  { font-family: var(--fui); font-size: 10px; text-transform: uppercase; color: var(--grey); }\n\n/* ── SHADOW VIZ ── */\n.shad-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; }\n.shad-box { background: var(--cream); border: 2px solid #000; width: 130px; height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 10px; gap: 4px; }\n.shad-lbl { font-family: var(--fui); font-size: 10px; text-transform: uppercase; color: var(--grey); }\n\n/* ── BG PALETTE STRIP ── */\n.bg-strip { display: flex; margin-bottom: 28px; border: 2px solid #000; overflow: hidden; }\n.bg-chip  { flex: 1; height: 56px; display: flex; align-items: center; justify-content: center; }\n.bg-chip span { font-family: 'Courier New', monospace; font-size: 10px; font-weight: 700; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav class=\"doc-nav\">\n  <span class=\"brand\">Kaadu<\u002Fspan>\n  <a href=\"#fonts\">Fonts<\u002Fa>\n  <a href=\"#type-scale\">Type Scale<\u002Fa>\n  <a href=\"#buttons\">Buttons<\u002Fa>\n  <a href=\"#weights\">Weights &amp; Styles<\u002Fa>\n  <a href=\"#line-height\">Line Heights<\u002Fa>\n  <a href=\"#spacing\">Spacing<\u002Fa>\n  <a href=\"#padding\">Padding<\u002Fa>\n  <a href=\"#margins\">Margins<\u002Fa>\n  <a href=\"#radius\">Radius<\u002Fa>\n  <a href=\"#shadows\">Shadows<\u002Fa>\n  <a href=\"#bg\">Backgrounds<\u002Fa>\n<\u002Fnav>\n\n<div class=\"page\">\n\n  <!-- HERO -->\n  <div style=\"margin-top:48px;\">\n    <div style=\"font-family:'Fagies',sans-serif;font-size:80px;text-transform:uppercase;color:var(--red);line-height:.95;margin-bottom:4px;\">Typography<\u002Fdiv>\n    <div style=\"font-family:'Fagies',sans-serif;font-size:80px;text-transform:uppercase;color:var(--violet);line-height:.95;margin-bottom:20px;\">&amp; Spacing<\u002Fdiv>\n    <p style=\"font-family:'Banter Grotesk',sans-serif;font-size:16px;line-height:26px;color:#444;max-width:560px;\">Complete, Figma-accurate reference for every typographic token, spacing value, padding rule, button spec, radius and shadow in the Kaadu design system. Updated from source — v2.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- ════ FONTS ════ -->\n  <div class=\"sec\" id=\"fonts\">\n    <div class=\"sec-title\">Fonts<\u002Fdiv>\n    <div class=\"sec-sub\">Two brand typefaces. Files live in <code>fonts/<\u002Fcode>. No web fallbacks beyond generic sans-serif should be used in production.<\u002Fdiv>\n\n    <div class=\"card\">\n      <div class=\"card-head\">\n        <span class=\"card-name\">Fagies — Display<\u002Fspan>\n        <span class=\"card-spec\">Fagies.ttf · weight 400 only · role: H1, H2, prices, blob-button labels, mega-ticker<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card-body\" style=\"background:var(--pink); padding:28px 32px;\">\n        <div style=\"font-family:'Fagies',sans-serif;font-size:64px;line-height:80px;text-transform:uppercase;color:var(--red);\">Snack Like You Give a Damn.<\u002Fdiv>\n        <div style=\"font-family:'Fagies',sans-serif;font-size:32px;text-transform:uppercase;color:var(--violet);margin-top:12px;\">Justice Never Tasted So Sweet<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card-code\"><span class=\"c\">/* @font-face — defined once in colors_and_type.css */<\u002Fspan>\n@font-face {\n  <span class=\"k\">font-family<\u002Fspan>: <span class=\"s\">'Fagies'<\u002Fspan>;\n  <span class=\"k\">src<\u002Fspan>: url(<span class=\"s\">'./fonts/Fagies.ttf'<\u002Fspan>) format(<span class=\"s\">'truetype'<\u002Fspan>);\n  <span class=\"k\">font-weight<\u002Fspan>: <span class=\"v\">400<\u002Fspan>; <span class=\"c\">/* only one weight exists — never set 700 on Fagies */<\u002Fspan>\n  <span class=\"k\">font-display<\u002Fspan>: <span class=\"v\">swap<\u002Fspan>;\n}\n\n<span class=\"c\">/* CSS variable */<\u002Fspan>\n<span class=\"k\">--font-display<\u002Fspan>: <span class=\"s\">'Fagies'<\u002Fspan>, Helvetica, Arial, sans-serif;<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\">\n      <div class=\"card-head\">\n        <span class=\"card-name\">Banter Grotesk — UI / Body<\u002Fspan>\n        <span class=\"card-spec\">BanterGrotesk-Regular.woff2 · weights 400 + 700 · role: H3, body, captions, secondary buttons, nav<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card-body\">\n        <div style=\"font-family:'Banter Grotesk',sans-serif;font-weight:700;font-size:32px;text-transform:uppercase;color:var(--violet);margin-bottom:10px;\">Fairness für Kleinbauern — <span style=\"font-weight:400;font-size:24px;\">Subheading Level<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Banter Grotesk',sans-serif;font-weight:400;font-size:18px;line-height:28px;color:#000;max-width:540px;\">100 % Frucht. 0 % Ausbeutung. Gefriergetrocknete Früchte – fair produziert, in der Ursprungsgemeinde verarbeitet, radikal transparent.<\u002Fdiv>\n        <div style=\"font-family:'Banter Grotesk',sans-serif;font-weight:400;font-size:14px;line-height:20px;color:var(--grey);margin-top:8px;\">* Alle Preise inkl. MwSt. Versand ab CHF 50 kostenlos.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card-code\">@font-face {\n  <span class=\"k\">font-family<\u002Fspan>: <span class=\"s\">'Banter Grotesk'<\u002Fspan>;\n  <span class=\"k\">src<\u002Fspan>: url(<span class=\"s\">'./fonts/BanterGrotesk-Regular.woff2'<\u002Fspan>) format(<span class=\"s\">'woff2'<\u002Fspan>);\n  <span class=\"k\">font-weight<\u002Fspan>: <span class=\"v\">400<\u002Fspan>; <span class=\"c\">/* Regular */<\u002Fspan>\n  <span class=\"k\">font-display<\u002Fspan>: <span class=\"v\">swap<\u002Fspan>;\n}\n@font-face {\n  <span class=\"k\">font-family<\u002Fspan>: <span class=\"s\">'Banter Grotesk'<\u002Fspan>;\n  <span class=\"k\">src<\u002Fspan>: url(<span class=\"s\">'./fonts/BanterGrotesk-Regular.woff2'<\u002Fspan>) format(<span class=\"s\">'woff2'<\u002Fspan>);\n  <span class=\"k\">font-weight<\u002Fspan>: <span class=\"v\">700<\u002Fspan>; <span class=\"c\">/* Semibold — maps to same file until Semibold .woff2 supplied */<\u002Fspan>\n  <span class=\"k\">font-display<\u002Fspan>: <span class=\"v\">swap<\u002Fspan>;\n}\n\n<span class=\"c\">/* CSS variables */<\u002Fspan>\n<span class=\"k\">--font-heading<\u002Fspan>: <span class=\"s\">'Banter Grotesk'<\u002Fspan>, Helvetica, Arial, sans-serif;\n<span class=\"k\">--font-body<\u002Fspan>:    <span class=\"s\">'Banter Grotesk'<\u002Fspan>, Helvetica, Arial, sans-serif;<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════ TYPE SCALE ════ -->\n  <div class=\"sec\" id=\"type-scale\">\n    <div class=\"sec-title\">Type Scale<\u002Fdiv>\n    <div class=\"sec-sub\">All values from Figma source. H1 = 64/72, H2 = 48/56, H3 = 24/32, H4 = 32/40, Body = 24/32. Mobile overrides shown per token.<\u002Fdiv>\n\n    <!-- H1 -->\n    <div class=\"card\">\n      <div class=\"card-head\">\n        <span class=\"card-name\">H1 — Display Headline<\u002Fspan>\n        <span class=\"card-spec\">Fagies 400 · 64px / 72px lh · uppercase · source: Section-1, Section-21, H1-DISPLAY-HEADLINE frame<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card-body\" style=\"background:var(--pink);\">\n        <div style=\"font-family:'Fagies',sans-serif;font-size:64px;line-height:72px;text-transform:uppercase;color:var(--red);\">The Snacks That<br>Change Lives<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card-code\"><span class=\"k\">font-family<\u002Fspan>:    <span class=\"s\">'Fagies'<\u002Fspan>, Helvetica, Arial, sans-serif;\n<span class=\"k\">font-weight<\u002Fspan>:    <span class=\"v\">400<\u002Fspan>;\n<span class=\"k\">font-size<\u002Fspan>:      <span class=\"v\">64px<\u002Fspan>;\n<span class=\"k\">line-height<\u002Fspan>:    <span class=\"v\">72px<\u002Fspan>;\n<span class=\"k\">text-transform<\u002Fspan>: <span class=\"v\">uppercase<\u002Fspan>;\n<span class=\"k\">letter-spacing<\u002Fspan>: <span class=\"v\">-0.01em<\u002Fspan>;\n<span class=\"k\">color<\u002Fspan>:          <span class=\"v\">#AE0000<\u002Fspan>; <span class=\"c\">/* varies by section bg — see Color Pairings */<\u002Fspan>\n\n<span class=\"c\">/* Mobile (max-width: 390px) — confirmed from Figma iPhone frames */<\u002Fspan>\n<span class=\"k\">font-size<\u002Fspan>:   <span class=\"v\">48px<\u002Fspan>;\n<span class=\"k\">line-height<\u002Fspan>: <span class=\"v\">56px<\u002Fspan>; <span class=\"c\">/* Figma H1 Mobile: 48/56 */<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- MEGA TICKER -->\n    <div class=\"card\">\n      <div class=\"card-head\">\n        <span class=\"card-name\">Mega Ticker — Hero Banner Text<\u002Fspan>\n        <span class=\"card-spec\">Fagies 400 · 156.83px / 196.04px lh · uppercase · source: Section-15 (\"WIR SIND:\")<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card-body\" style=\"background:var(--yellow);overflow:hidden;padding:0;height:100px;display:flex;align-items:center;\">\n        <div style=\"font-family:'Fagies',sans-serif;font-size:100px;text-transform:uppercase;color:var(--violet);white-space:nowrap;line-height:1;padding:0 16px;\">WIR SIND: WIR SIND:<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card-code\"><span class=\"c\">/* Full-bleed oversized text used as decorative banner — clips at edges */<\u002Fspan>\n<span class=\"k\">font-family<\u002Fspan>:    <span class=\"s\">'Fagies'<\u002Fspan>, Helvetica, Arial, sans-serif;\n<span class=\"k\">font-weight<\u002Fspan>:    <span class=\"v\">400<\u002Fspan>;\n<span class=\"k\">font-size<\u002Fspan>:      <span class=\"v\">156.83px<\u002Fspan>;  <span class=\"c\">/* exact Figma value */<\u002Fspan>\n<span class=\"k\">line-height<\u002Fspan>:    <span class=\"v\">196.04px<\u002Fspan>;\n<span class=\"k\">text-transform<\u002Fspan>: <span class=\"v\">uppercase<\u002Fspan>;\n<span class=\"k\">color<\u002Fspan>:          <span class=\"v\">#542A76<\u002Fspan>;   <span class=\"c\">/* violet on yellow bg */<\u002Fspan>\n<span class=\"k\">white-space<\u002Fspan>:    <span class=\"v\">nowrap<\u002Fspan>;\n<span class=\"k\">overflow<\u002Fspan>:       <span class=\"v\">hidden<\u002Fspan>;<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- H2 -->\n    <div class=\"card\">\n      <div class=\"card-head\">\n        <span class=\"card-name\">H2 — Section Headline<\u002Fspan>\n        <span class=\"card-spec\">Fagies 400 · 48px / 56px lh · uppercase · source: H2-Section-Headline frame<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card-body\">\n        <div style=\"font-family:'Fagies',sans-serif;font-weight:400;font-size:48px;line-height:56px;text-transform:uppercase;color:#0c0c0c;\">Marktpreise schwanken,<br>unsere nicht<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card-code\"><span class=\"k\">font-family<\u002Fspan>:    <span class=\"s\">'Fagies'<\u002Fspan>, Helvetica, Arial, sans-serif;\n<span class=\"k\">font-weight<\u002Fspan>:    <span class=\"v\">400<\u002Fspan>;\n<span class=\"k\">font-size<\u002Fspan>:      <span class=\"v\">48px<\u002Fspan>;\n<span class=\"k\">line-height<\u002Fspan>:    <span class=\"v\">56px<\u002Fspan>;\n<span class=\"k\">text-transform<\u002Fspan>: <span class=\"v\">uppercase<\u002Fspan>;\n<span class=\"k\">color<\u002Fspan>:          <span class=\"v\">#0C0C0C<\u002Fspan>;\n\n<span class=\"c\">/* Mobile (max-width: 390px) */<\u002Fspan>\n<span class=\"k\">font-size<\u002Fspan>:   <span class=\"v\">40px<\u002Fspan>; <span class=\"c\">/* Figma H2 Mobile: 40/44 */<\u002Fspan>\n<span class=\"k\">line-height<\u002Fspan>: <span class=\"v\">44px<\u002Fspan>;<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- H3 -->\n    <div class=\"card\">\n      <div class=\"card-head\">\n        <span class=\"card-name\">H3 — Subheading<\u002Fspan>\n        <span class=\"card-spec\">Banter Grotesk 700 · 24px / 32px lh · uppercase · source: H3-Subheading frame, Section-5<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card-body\">\n        <div style=\"font-family:'Banter Grotesk',sans-serif;font-weight:700;font-size:24px;line-height:32px;text-transform:uppercase;color:#0c0c0c;\">Starke Jobs für lokale Frauen<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card-code\"><span class=\"k\">font-family<\u002Fspan>:    <span class=\"s\">'Banter Grotesk'<\u002Fspan>, Helvetica, Arial, sans-serif;\n<span class=\"k\">font-weight<\u002Fspan>:    <span class=\"v\">700<\u002Fspan>;\n<span class=\"k\">font-size<\u002Fspan>:      <span class=\"v\">24px<\u002Fspan>;\n<span class=\"k\">line-height<\u002Fspan>:    <span class=\"v\">32px<\u002Fspan>;\n<span class=\"k\">text-transform<\u002Fspan>: <span class=\"v\">uppercase<\u002Fspan>;\n\n<span class=\"c\">/* Mobile (max-width: 390px) — Figma H3 Mobile: 16/24 */<\u002Fspan>\n<span class=\"k\">font-size<\u002Fspan>:   <span class=\"v\">16px<\u002Fspan>;\n<span class=\"k\">line-height<\u002Fspan>: <span class=\"v\">24px<\u002Fspan>;<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- H4 -->\n    <div class=\"card\">\n      <div class=\"card-head\">\n        <span class=\"card-name\">H4 — Sub-Section Heading<\u002Fspan>\n        <span class=\"card-spec\">Banter Grotesk 700 · 32px / 40px lh · uppercase · source: H4 style<\u002Fspan>\n      <\u002Fdiv>\n      <div \u002Fspan> <span class=\"sp-note\">— default card padding (mobile), grid gutter (mobile), margin-bottom H1→body<\u002Fspan><\u002Fdiv>\n      <div class=\"sp-row\"><div class=\"sp-bar\" style=\"width:24px;\"><\u002Fdiv> <span class=\"sp-tok\">--space-6<\u002Fspan><span class=\"sp-px\">24px<\u002Fspan> <span class=\"sp-note\">— grid gutter (desktop), ticker text padding, margin-bottom overline→H1<\u002Fspan><\u002Fdiv>\n      <div class=\"sp-row\"><div class=\"sp-bar\" style=\"width:32px;\"><\u002Fdiv> <span class=\"sp-tok\">--space-8<\u002Fspan><span class=\"sp-px\">32px<\u002Fspan> <span class=\"sp-note\">— section side padding, card padding (desktop), margin-bottom H1→body<\u002Fspan><\u002Fdiv>\n      <div class=\"sp-row\"><div class=\"sp-bar\" style=\"width:48px;\"><\u002Fdiv> <span class=\"sp-tok\">--space-12<\u002Fspan><span class=\"sp-px\">48px<\u002Fspan><span class=\"sp-note\">— section headline → section content, stat card group gaps<\u002Fspan><\u002Fdiv>\n      <div class=\"sp-row\"><div class=\"sp-bar\" style=\"width:64px;\"><\u002Fdiv> <span class=\"sp-tok\">--space-16<\u002Fspan><span class=\"sp-px\">64px<\u002Fspan><span class=\"sp-note\">— section vertical padding (desktop), large component gaps<\u002Fspan><\u002Fdiv>\n      <div class=\"sp-row\"><div class=\"sp-bar\" style=\"width:80px;\"><\u002Fdiv> <span class=\"sp-tok\">--space-20<\u002Fspan><span class=\"sp-px\">80px<\u002Fspan><span class=\"sp-note\">— section vertical padding (UI kit, from Figma)<\u002Fspan><\u002Fdiv>\n      <div class=\"sp-row\"><div class=\"sp-bar\" style=\"width:96px;\"><\u002Fdiv> <span class=\"sp-tok\">--space-24<\u002Fspan><span class=\"sp-px\">96px<\u002Fspan><span class=\"sp-note\">— large section separators<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card-code\"><span class=\"c\">/* Spacing tokens — colors_and_type.css */<\u002Fspan>\n--space-1:  <span class=\"v\">4px<\u002Fspan>;\n--space-2:  <span class=\"v\">8px<\u002Fspan>;\n--space-3:  <span class=\"v\">12px<\u002Fspan>;\n--space-4:  <span class=\"v\">16px<\u002Fspan>;\n--space-6:  <span class=\"v\">24px<\u002Fspan>;\n--space-8:  <span class=\"v\">32px<\u002Fspan>;\n--space-12: <span class=\"v\">48px<\u002Fspan>;\n--space-16: <span class=\"v\">64px<\u002Fspan>;\n--space-24: <span class=\"v\">96px<\u002Fspan>;<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════ PADDING ════ -->\n  <div class=\"sec\" id=\"padding\">\n    <div class=\"sec-title\">Padding Rules<\u002Fdiv>\n    <div class=\"sec-sub\">Defined by component type. All values are multiples of 4px.<\u002Fdiv>\n    <table class=\"tbl\">\n      <thead><tr><th>Component<\u002Fth><th>Padding<\u002Fth><th>CSS<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>Section (desktop)<\u002Ftd><td class=\"val\">80px 32px<\u002Ftd><td class=\"mono\">padding: 80px 32px<\u002Ftd><td>Figma sections ~978px tall — adjust for content<\u002Ftd><\u002Ftr>\n        <tr><td>Section (mobile)<\u002Ftd><td class=\"val\">40px 16px<\u002Ftd><td class=\"mono\">padding: 40px 16px<\u002Ftd><td><\u002Ftd><\u002Ftr>\n        <tr><td>Nav bar<\u002Ftd><td class=\"val\">0 32px<\u002Ftd><td class=\"mono\">padding: 0 32px; height: 64px<\u002Ftd><td>Fixed height, side padding only<\u002Ftd><\u002Ftr>\n        <tr><td>Card default<\u002Ftd><td class=\"val\">20px 24px<\u002Ftd><td class=\"mono\">padding: 20px 24px<\u002Ftd><td><\u002Ftd><\u002Ftr>\n        <tr><td>Product card — image area<\u002Ftd><td class=\"val\">0<\u002Ftd><td class=\"mono\">padding: 0<\u002Ftd><td>Full-bleed image<\u002Ftd><\u002Ftr>\n        <tr><td>Product card — info area<\u002Ftd><td class=\"val\">12px 16px<\u002Ftd><td class=\"mono\">padding: 12px 16px<\u002Ftd><td><\u002Ftd><\u002Ftr>\n        <tr><td>Blob button<\u002Ftd><td class=\"val\">0<\u002Ftd><td class=\"mono\">padding: 0<\u002Ftd><td>Label absolutely positioned inside blob image bounds<\u002Ftd><\u002Ftr>\n        <tr><td>Secondary pill button<\u002Ftd><td class=\"val\">~14px 28px<\u002Ftd><td class=\"mono\">padding: 14px 28px<\u002Ftd><td>Results in 55px total height (Figma exact)<\u002Ftd><\u002Ftr>\n        <tr><td>Nav pill (small)<\u002Ftd><td class=\"val\">8px 18px<\u002Ftd><td class=\"mono\">padding: 8px 18px<\u002Ftd><td><\u002Ftd><\u002Ftr>\n        <tr><td>Badge / impact pill<\u002Ftd><td class=\"val\">6px 14–18px<\u002Ftd><td class=\"mono\">padding: 6px 16px<\u002Ftd><td><\u002Ftd><\u002Ftr>\n        <tr><td>Ticker text node<\u002Ftd><td class=\"val\">0 24px<\u002Ftd><td class=\"mono\">padding: 0 24px<\u002Ftd><td>Per text span; container is full-bleed zero padding<\u002Ftd><\u002Ftr>\n        <tr><td>Footer<\u002Ftd><td class=\"val\">48px 32px 32px<\u002Ftd><td class=\"mono\">padding: 48px 32px 32px<\u002Ftd><td>Less top than a full section<\u002Ftd><\u002Ftr>\n        <tr><td>Container inner<\u002Ftd><td class=\"val\">0 32px<\u002Ftd><td class=\"mono\">max-width: 1200px; margin: 0 auto; padding: 0 32px<\u002Ftd><td><\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n\n  <!-- ════ MARGINS ════ -->\n  <div class=\"sec\" id=\"margins\">\n    <div class=\"sec-title\">Margin Rules<\u002Fdiv>\n    <div class=\"sec-sub\">Vertical rhythm between elements within a content column. Use gap for flex/grid children rather than margin.<\u002Fdiv>\n    <table class=\"tbl\">\n      <thead><tr><th>From → To<\u002Fth><th>Margin<\u002Fth><th>CSS<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>Overline / label → H1<\u002Ftd><td class=\"val\">16px<\u002Ftd><td class=\"mono\">margin-bottom: 16px<\u002Ftd><\u002Ftr>\n        <tr><td>H1 → body copy<\u002Ftd><td class=\"val\">24px<\u002Ftd><td class=\"mono\">margin-bottom: 24px<\u002Ftd><\u002Ftr>\n        <tr><td>H1 → subheading<\u002Ftd><td class=\"val\">16px<\u002Ftd><td class=\"mono\">margin-bottom: 16px<\u002Ftd><\u002Ftr>\n        <tr><td>H2 → body<\u002Ftd><td class=\"val\">16px<\u002Ftd><td class=\"mono\">margin-bottom: 16px<\u002Ftd><\u002Ftr>\n        <tr><td>Section headline → content block<\u002Ftd><td class=\"val\">48–56px<\u002Ftd><td class=\"mono\">margin-bottom: 48px<\u002Ftd><\u002Ftr>\n        <tr><td>Body paragraph → next paragraph<\u002Ftd><td class=\"val\">16px<\u002Ftd><td class=\"mono\">margin-bottom: 16px<\u002Ftd><\u002Ftr>\n        <tr><td>Body → CTA group<\u002Ftd><td class=\"val\">32px<\u002Ftd><td class=\"mono\">margin-bottom: 32px<\u002Ftd><\u002Ftr>\n        <tr><td>Between buttons in a group<\u002Ftd><td class=\"val\">16px<\u002Ftd><td class=\"mono\">gap: 16px<\u002Ftd><\u002Ftr>\n        <tr><td>Product grid gap<\u002Ftd><td class=\"val\">24px<\u002Ftd><td class=\"mono\">gap: 24px<\u002Ftd><\u002Ftr>\n        <tr><td>Impact / stat card group<\u002Ftd><td class=\"val\">16px<\u002Ftd><td class=\"mono\">gap: 16px<\u002Ftd><\u002Ftr>\n        <tr><td>Two-column impact layout<\u002Ftd><td class=\"val\">48–64px<\u002Ftd><td class=\"mono\">gap: 48px<\u002Ftd><\u002Ftr>\n        <tr><td>List item dot → text<\u002Ftd><td class=\"val\">10px<\u002Ftd><td class=\"mono\">gap: 10px<\u002Ftd><\u002Ftr>\n        <tr><td>Nav logo → links<\u002Ftd><td class=\"val\">32px<\u002Ftd><td class=\"mono\">gap: 32px (flex)<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"card-code\"><span class=\"c\">/* Typical content column rhythm */<\u002Fspan>\n.overline    { <span class=\"k\">margin-bottom<\u002Fspan>: <span class=\"v\">16px<\u002Fspan>; }\nh1           { <span class=\"k\">margin-bottom<\u002Fspan>: <span class=\"v\">24px<\u002Fspan>; }\n.lead        { <span class=\"k\">margin-bottom<\u002Fspan>: <span class=\"v\">32px<\u002Fspan>; }\n.btn-group   { <span class=\"k\">display<\u002Fspan>: <span class=\"v\">flex<\u002Fspan>; <span class=\"k\">gap<\u002Fspan>: <span class=\"v\">16px<\u002Fspan>; <span class=\"k\">flex-wrap<\u002Fspan>: <span class=\"v\">wrap<\u002Fspan>; }\n\n<span class=\"c\">/* Grid gaps */<\u002Fspan>\n.product-grid { <span class=\"k\">display<\u002Fspan>: <span class=\"v\">grid<\u002Fspan>; <span class=\"k\">grid-template-columns<\u002Fspan>: <span class=\"v\">repeat(3, 1fr)<\u002Fspan>; <span class=\"k\">gap<\u002Fspan>: <span class=\"v\">24px<\u002Fspan>; }\n.impact-grid  { <span class=\"k\">display<\u002Fspan>: <span class=\"v\">grid<\u002Fspan>; <span class=\"k\">grid-template-columns<\u002Fspan>: <span class=\"v\">1fr 1fr<\u002Fspan>; <span class=\"k\">gap<\u002Fspan>: <span class=\"v\">64px<\u002Fspan>; }<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════ RADIUS ════ -->\n  <div class=\"sec\" id=\"radius\">\n    <div class=\"sec-title\">Border Radius<\u002Fdiv>\n    <div class=\"sec-sub\">Three values in use. No arbitrary radii.<\u002Fdiv>\n    <div class=\"rad-row\">\n      <div><div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:8px;\">0px<\u002Fdiv><div class=\"rad-box\" style=\"border-radius:0;\"><span class=\"rad-n\">0<\u002Fspan><span class=\"rad-t\">sections<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:8px;\">12px<\u002Fdiv><div class=\"rad-box\" style=\"border-radius:12px;\"><span class=\"rad-n\">12px<\u002Fspan><span class=\"rad-t\">cards<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:8px;\">16px<\u002Fdiv><div class=\"rad-box\" style=\"border-radius:16px;\"><span class=\"rad-n\">16px<\u002Fspan><span class=\"rad-t\">sticker frames<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:8px;\">30px<\u002Fdiv><div class=\"rad-box\" style=\"border-radius:30px;width:120px;\"><span class=\"rad-n\">30px<\u002Fspan><span class=\"rad-t\">buttons, badges<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:8px;\">50%<\u002Fdiv><div class=\"rad-box\" style=\"border-radius:50%;\"><span class=\"rad-n\">50%<\u002Fspan><span class=\"rad-t\">dots, icons<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card-code\">--radius-sharp:   <span class=\"v\">0px<\u002Fspan>;   <span class=\"c\">/* full-bleed sections, ticker bars */<\u002Fspan>\n--radius-card:    <span class=\"v\">12px<\u002Fspan>;  <span class=\"c\">/* product cards, data boxes */<\u002Fspan>\n--radius-sticker: <span class=\"v\">16px<\u002Fspan>;  <span class=\"c\">/* sticker/mascot frames */<\u002Fspan>\n--radius-btn:     <span class=\"v\">30px<\u002Fspan>;  <span class=\"c\">/* secondary pill buttons, badges, nav CTAs */<\u002Fspan>\n--radius-circle:  <span class=\"v\">50%<\u002Fspan>;   <span class=\"c\">/* impact indicator dots, icon circles */<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════ SHADOWS ════ -->\n  <div class=\"sec\" id=\"shadows\">\n    <div class=\"sec-title\">Shadows<\u002Fdiv>\n    <div class=\"sec-sub\">Three named shadows. From Figma source values exactly.<\u002Fdiv>\n    <div class=\"shad-row\">\n      <div>\n        <div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:12px;\">sm<\u002Fdiv>\n        <div class=\"shad-box\" style=\"box-shadow:0px 2px 7.6px 0px rgba(0,0,0,0.25);\"><span class=\"shad-lbl\">--shadow-sm<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:12px;\">md<\u002Fdiv>\n        <div class=\"shad-box\" style=\"box-shadow:0px 4px 4px 0px rgba(0,0,0,0.25);\"><span class=\"shad-lbl\">--shadow-md<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:12px;\">glow<\u002Fdiv>\n        <div class=\"shad-box\" style=\"box-shadow:0px 0px 35px 0px rgba(0,0,0,0.10);\"><span class=\"shad-lbl\">--shadow-glow<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:var(--fui);font-size:10px;text-transform:uppercase;color:#888;margin-bottom:12px;\">hover (md+)<\u002Fdiv>\n        <div class=\"shad-box\" style=\"box-shadow:0px 6px 8px 0px rgba(0,0,0,0.25);\"><span class=\"shad-lbl\">on hover<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <table class=\"tbl\" style=\"margin-bottom:16px;\">\n      <thead><tr><th>Token<\u002Fth><th>Value<\u002Fth><th>Used on<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"mono\">--shadow-sm<\u002Ftd><td class=\"val\">0px 2px 7.6px 0px rgba(0,0,0,0.25)<\u002Ftd><td>Mobile elements, small components<\u002Ftd><\u002Ftr>\n        <tr><td class=\"mono\">--shadow-md<\u002Ftd><td class=\"val\">0px 4px 4px 0px rgba(0,0,0,0.25)<\u002Ftd><td>Default: all buttons, cards, product tiles<\u002Ftd><\u002Ftr>\n        <tr><td class=\"mono\">--shadow-glow<\u002Ftd><td class=\"val\">0px 0px 35px 0px rgba(0,0,0,0.10)<\u002Ftd><td>Hero product images, large imagery<\u002Ftd><\u002Ftr>\n        <tr><td class=\"mono\">hover state<\u002Ftd><td class=\"val\">0px 6px 8px 0px rgba(0,0,0,0.25)<\u002Ftd><td>Deepened md — applied on :hover of buttons/cards<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"card-code\">--shadow-sm:   <span class=\"v\">0px 2px 7.6px 0px rgba(0,0,0,0.25)<\u002Fspan>;\n--shadow-md:   <span class=\"v\">0px 4px 4px 0px rgba(0,0,0,0.25)<\u002Fspan>;\n--shadow-glow: <span class=\"v\">0px 0px 35px 0px rgba(0,0,0,0.10)<\u002Fspan>;\n\n<span class=\"c\">/* Button hover pattern */<\u002Fspan>\n.btn:hover  { <span class=\"k\">transform<\u002Fspan>: <span class=\"v\">translateY(-2px)<\u002Fspan>; <span class=\"k\">box-shadow<\u002Fspan>: <span class=\"v\">0px 6px 8px 0px rgba(0,0,0,0.25)<\u002Fspan>; }\n.btn:active { <span class=\"k\">transform<\u002Fspan>: <span class=\"v\">translateY(0)<\u002Fspan>;    <span class=\"k\">box-shadow<\u002Fspan>: <span class=\"v\">var(--shadow-sm)<\u002Fspan>; }\n<span class=\"c\">/* transition: transform 0.15s ease, box-shadow 0.15s ease; */<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ════ BACKGROUNDS ════ -->\n  <div class=\"sec\" id=\"bg\">\n    <div class=\"sec-title\">Section Backgrounds<\u002Fdiv>\n    <div class=\"sec-sub\">Sections alternate solid color blocks — no gradients. Confirmed from all Figma Webdesign sections.<\u002Fdiv>\n\n    <div class=\"bg-strip\">\n      <div class=\"bg-chip\" style=\"background:#FFC5FF;flex:2;\"><span style=\"color:#AE0000;\">#FFC5FF<\u002Fspan><\u002Fdiv>\n      <div class=\"bg-chip\" style=\"background:#FFFFF5;\"><span style=\"color:#AE0000;\">#FFFFF5<\u002Fspan><\u002Fdiv>\n      <div class=\"bg-chip\" style=\"background:#542A76;\"><span style=\"color:#FFC5FF;\">#542A76<\u002Fspan><\u002Fdiv>\n      <div class=\"bg-chip\" style=\"background:#B7D9FF;\"><span style=\"color:#542A76;\">#B7D9FF<\u002Fspan><\u002Fdiv>\n      <div class=\"bg-chip\" style=\"background:#ACFF64;\"><span style=\"color:#AE0000;\">#ACFF64<\u002Fspan><\u002Fdiv>\n      <div class=\"bg-chip\" style=\"background:#AE0000;\"><span style=\"color:#FFFFF5;\">#AE0000<\u002Fspan><\u002Fdiv>\n      <div class=\"bg-chip\" style=\"background:#FF781E;\"><span style=\"color:#FFFFF5;\">#FF781E<\u002Fspan><\u002Fdiv>\n      <div class=\"bg-chip\" style=\"background:#EDF731;\"><span style=\"color:#542A76;\">#EDF731<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <table class=\"tbl\">\n      <thead><tr><th>Background<\u002Fth><th>Hex<\u002Fth><th>Text color on this bg<\u002Fth><th>Sections<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td>Light Pink / Rose<\u002Ftd><td class=\"val\">#FFC5FF<\u002Ftd><td class=\"mono\">#AE0000 (red) or #000<\u002Ftd><td>Hero (Section 1), mobile screens<\u002Ftd><\u002Ftr>\n        <tr><td>Cream<\u002Ftd><td class=\"val\">#FFFFF5<\u002Ftd><td class=\"mono\">#AE0000 or #000<\u002Ftd><td>Product (Sections 9, 10, 21), light sections<\u002Ftd><\u002Ftr>\n        <tr><td>Violet<\u002Ftd><td class=\"val\">#542A76<\u002Ftd><td class=\"mono\">#FFFFF5 (cream)<\u002Ftd><td>Jobs/Women (Section 6), CTAs (Section 9)<\u002Ftd><\u002Ftr>\n        <tr><td>Sky Blue<\u002Ftd><td class=\"val\">#B7D9FF<\u002Ftd><td class=\"mono\">#542A76 (violet)<\u002Ftd><td>Fairness/Farmer (Section 5), Transparency (Section 20)<\u002Ftd><\u002Ftr>\n        <tr><td>Lime Green<\u002Ftd><td class=\"val\">#ACFF64<\u002Ftd><td class=\"mono\">#AE0000 (red) or #000<\u002Ftd><td>Ticker bar, Radically Fair (Section 16)<\u002Ftd><\u002Ftr>\n        <tr><td>Red<\u002Ftd><td class=\"val\">#AE0000<\u002Ftd><td class=\"mono\">#FFFFF5 (cream)<\u002Ftd><td>Mission (Section 12)<\u002Ftd><\u002Ftr>\n        <tr><td>Orange<\u002Ftd><td class=\"val\">#FF781E<\u002Ftd><td class=\"mono\">#FFFFF5 (cream)<\u002Ftd><td>Community / Wirkung (Section 17)<\u002Ftd><\u002Ftr>\n        <tr><td>Electric Yellow<\u002Ftd><td class=\"val\">#EDF731<\u002Ftd><td class=\"mono\">#542A76 (violet)<\u002Ftd><td>Mega ticker / \"WIR SIND:\" (Section 15)<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"card-code\"><span class=\"c\">/* Semantic background tokens */<\u002Fspan>\n--color-bg-hero:    <span class=\"v\">#FFC5FF<\u002Fspan>;   <span class=\"c\">/* pink */<\u002Fspan>\n--color-bg-light:   <span class=\"v\">#FFFFF5<\u002Fspan>;   <span class=\"c\">/* cream */<\u002Fspan>\n--color-bg-dark:    <span class=\"v\">#542A76<\u002Fspan>;   <span class=\"c\">/* violet */<\u002Fspan>\n--color-bg-sky:     <span class=\"v\">#B7D9FF<\u002Fspan>;   <span class=\"c\">/* sky blue */<\u002Fspan>\n--color-bg-ticker:  <span class=\"v\">#ACFF64<\u002Fspan>;   <span class=\"c\">/* lime */<\u002Fspan>\n--color-bg-mission: <span class=\"v\">#AE0000<\u002Fspan>;   <span class=\"c\">/* red section */<\u002Fspan>\n--color-bg-orange:  <span class=\"v\">#FF781E<\u002Fspan>;   <span class=\"c\">/* orange section */<\u002Fspan>\n--color-bg-yellow:  <span class=\"v\">#EDF731<\u002Fspan>;   <span class=\"c\">/* electric yellow */<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:80px;background:#000;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;\">\n    <div style=\"font-family:'Fagies',sans-serif;font-size:32px;text-transform:uppercase;color:var(--red);\">Kaadu Design System<\u002Fdiv>\n    <div style=\"font-family:'Banter Grotesk',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,245,0.4);\">v2 — sourced from Wireframe.fig<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
